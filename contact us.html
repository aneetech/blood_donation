<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Blood Bank</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Story+Script&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <!-- Custom CSS -->
    <style>
        * {
            margin: 0%;
            padding: 0%;
            box-sizing: border-box;
        }

        html, body {
font-family: "Caprasimo", serif;
  font-weight:15000px;
  font-style:italic ;
        }

        .navbar-brand {
            font-size: 2rem;
            font-weight: bold;
            color: white !important; /* Changed to white for better contrast */
        }

        .navbar {
            background-color: #dc3545 !important;
        }

        .navbar-nav .nav-link {
           font-size: 1.5rem;
            color: white !important;
        }

        .navbar-nav .nav-link:hover {
             background-color: brown;
            color: aliceblue;
        }

        .btn-donate {
            background-color: #dc3545;
            color: white;
            border: none;
        }

        .btn-donate:hover {
            background-color: #c82333;
        }

        .section-padding {
            padding: 50px 0;
            background-image: url("./image/aneesha6.jpg");
            background-repeat: no-repeat;
            background-size: cover;
        }

        footer {
            background-color: #343a40;
            color: white;
            padding: 20px 0;
        }

        /* Contact Section Styling */
        #contact {
            position: relative;
            background-color: #f8f9fa; /* Fallback background color */
            min-height: 100vh; /* Full viewport height */
            overflow: hidden;
        }

        #contact video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6; /* Adjust opacity as needed */
            z-index: -1;
        }

        .contact-form, .contact-details {
            background: rgba(255, 255, 255, 0.8); /* Semi-transparent background */
            padding: 20px;
            border-radius: 10px;
            position: relative;
            z-index: 1;
        }
.form-control{
background-color: #f4abb2;
}
.conte{
    width: 850px;
    font-weight: bold;
    font-size: large;


}

    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Blood Bank</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#home">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#about">About Us</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#donate">Donate Blood</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#request">Request Blood</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="contact us.html">Contact Us</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>



    <!-- Contact Us Section -->
    
    <section id="contact" class="section-padding">
    
        <div class="container" >
            <div class="conte">
            <h2 class="text-center mb-5" style="font-weight: bolder; font-size: 40px;" data-aos="flip-left">Contact Us</h2>
            <div class="row" data-aos="zoom-in"
     data-aos-easing="linear"
     data-aos-duration="1000">
                <!-- Contact Form -->
                 <!-- style="background-color: #d7a0a6;" -->
                
                    <div class="contact-form"   >
                        <form>
                            <div class="mb-3" >
                                <label for="name" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="name" placeholder="Enter your name" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                            </div>
                            <div class="mb-3">
                                <label for="message" class="form-label">Message</label>
                                <textarea class="form-control" id="message" rows="5" placeholder="Your message" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-donate w-100">Send Message</button>
                        </form>
                    </div>
                </div>
            
                
                </div>
            </div>
            </div>
        </div>
        
    </section>
    <div class="container">
        <h2 class="text-center mt-5" style="font-weight: bolder; font-size: 40px;">Location</h2>
        <div class="row m-3">
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d23784.02173950914!2d82.60662116926925!3d26.656609925571765!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3990b89108a7df01%3A0xea71c15d7ccd015f!2sHarraiya%2C%20Uttar%20Pradesh%20272301!5e0!3m2!1sen!2sin!4v1750663332185!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
</div>
</div>

    <footer class="text-center">
        <div class="container">

        </div>
    </footer>
